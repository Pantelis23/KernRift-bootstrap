name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  build-upload:
    name: build + upload (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Gate the release: fail early if repo is broken
      - name: Gates (fmt/clippy/test)
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Build (release)
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked -p kernriftc

      - name: Verify version matches tag (linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          expected="${GITHUB_REF_NAME#v}"
          got="$(./target/release/kernriftc --version | tr -d '\r')"
          echo "expected=$expected got=$got"
          echo "$got" | grep -F "$expected"

      - name: Verify version matches tag (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $expected = $env:GITHUB_REF_NAME.TrimStart('v')
          $got = (target\release\kernriftc.exe --version).Trim()
          Write-Host "expected=$expected got=$got"
          if ($got -notmatch [regex]::Escape($expected)) { throw "version mismatch" }

      - name: Package (linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mkdir -p dist
          cp target/release/kernriftc dist/kernriftc
          tar -czf "dist/kernriftc-${tag}-linux-amd64.tar.gz" -C dist kernriftc
          (
            cd dist
            sha256sum "kernriftc-${tag}-linux-amd64.tar.gz" > "kernriftc-${tag}-linux-amd64.tar.gz.sha256"
          )

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\kernriftc.exe dist\kernriftc.exe
          $zip = "dist\kernriftc-$tag-windows-amd64.zip"
          Compress-Archive -Force -Path dist\kernriftc.exe -DestinationPath $zip
          $h = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower()
          Set-Content -NoNewline -Path "$zip.sha256" -Value "$h  $(Split-Path -Leaf $zip)`n"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts (linux, keyless)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          for f in dist/*.tar.gz dist/*.tar.gz.sha256; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.cert" \
              "$f"
          done

      - name: Sign artifacts (windows, keyless)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $files = Get-ChildItem dist | Where-Object { $_.Name -match '\.zip(\.sha256)?$' }
          foreach ($f in $files) {
            $p = $f.FullName
            cosign sign-blob --yes `
              --output-signature "$p.sig" `
              --output-certificate "$p.cert" `
              "$p"
          }

      - name: Verify signatures (linux, keyless)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          for f in dist/*.tar.gz dist/*.tar.gz.sha256; do
            cosign verify-blob \
              --certificate "${f}.cert" \
              --signature "${f}.sig" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              --certificate-identity-regexp "^https://github.com/Pantelis23/KernRift/\\.github/workflows/release\\.yml@refs/tags/${GITHUB_REF_NAME}$" \
              "$f"
          done

      - name: Verify signatures (windows, keyless)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $re = "^https://github.com/Pantelis23/KernRift/\\.github/workflows/release\\.yml@refs/tags/$($env:GITHUB_REF_NAME)$"
          $files = Get-ChildItem dist | Where-Object { $_.Name -match '\.zip(\.sha256)?$' }
          foreach ($f in $files) {
            $p = $f.FullName
            cosign verify-blob `
              --certificate "$p.cert" `
              --signature "$p.sig" `
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" `
              --certificate-identity-regexp $re `
              "$p"
          }

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.tar.gz.sig
            dist/*.tar.gz.cert
            dist/*.zip
            dist/*.zip.sha256
            dist/*.zip.sig
            dist/*.zip.cert
