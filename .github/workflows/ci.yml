name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  kr0:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Guard: dist/ must not be tracked"
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files -z -- 'dist/*' | grep -q .; then
            echo "ERROR: dist/ is tracked. Remove it from git history and add /dist to .gitignore." >&2
            git ls-files -- 'dist/*' >&2
            exit 1
          fi

      - name: "Guard: no new blobs > 25MB"
        shell: bash
        env:
          LIMIT_BYTES: "26214400"
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Determine diff base/head
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$BASE_SHA"
            head="$HEAD_SHA"
          else
            # push event
            if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              echo "No BEFORE sha (new branch). Skipping size guard."
              exit 0
            fi
            base="$BEFORE_SHA"
            head="$HEAD_SHA"
          fi

          fail=0
          while IFS= read -r -d '' f; do
            [[ -f "$f" ]] || continue
            sz=$(wc -c <"$f" | tr -d ' ')
            if [[ "$sz" -gt "$LIMIT_BYTES" ]]; then
              echo "ERROR: $f is ${sz} bytes (> ${LIMIT_BYTES})" >&2
              fail=1
            fi
          done < <(git diff --name-only --diff-filter=AM -z "$base" "$head")

          exit "$fail"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace
