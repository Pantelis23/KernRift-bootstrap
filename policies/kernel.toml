# Reference profile policy document.
# Non-authoritative: `kernriftc check --profile kernel` defaults are materialized
# from canonical rule definitions in `crates/kernriftc/src/main.rs`.
[limits]
max_lock_depth = 1
max_no_yield_span = 64
forbid_unbounded_no_yield = true

[locks]
forbid_edges = [
  ["ConsoleLock", "SchedLock"],
]

[caps]
allow_module = []

[kernel]
allow_raw_mmio = false
forbid_alloc_in_irq = true
forbid_block_in_irq = true
forbid_yield_in_irq = false
forbid_yield_in_critical = false
forbid_effects_in_critical = ["yield", "alloc", "block"]
forbid_caps_in_irq = []
allow_caps_in_irq = []
